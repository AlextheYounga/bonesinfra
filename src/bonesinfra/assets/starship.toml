add_newline = true
command_timeout = 200
format = "[$username$hostname$directory$git_branch$git_status$git_metrics]($style)$character"

[username]
format = "[$user]($style)@"
show_always = true
style_root = "bold red"
style_user = "bold yellow"

[hostname]
format = "[$hostname]($style) "
ssh_only = false
style = "bold yellow"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[git_metrics]
disabled = false
format = "([+$added]($added_style))([-$deleted]($deleted_style)) "
added_style = "green"
deleted_style = "red"
